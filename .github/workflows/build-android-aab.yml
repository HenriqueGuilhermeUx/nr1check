name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Generate upload keystore
        working-directory: apps/android
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          keytool -genkeypair \
            -v \
            -keystore upload-keystore.jks \
            -storepass "$STORE_PASS" \
            -alias nr1check-upload \
            -keypass "$KEY_PASS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=NR1Check, OU=Alternative Ventures, O=Alternative Ventures Ltda, L=Santos, ST=SP, C=BR"
          echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> $GITHUB_ENV
          echo "STORE_PASSWORD=$STORE_PASS" > upload-keystore-passwords.txt
          echo "KEY_PASSWORD=$KEY_PASS" >> upload-keystore-passwords.txt
          echo "KEY_ALIAS=nr1check-upload" >> upload-keystore-passwords.txt

      - name: Build release AAB
        working-directory: apps/android
        run: |
          gradle bundleRelease \
            -PRELEASE_STORE_FILE=$PWD/upload-keystore.jks \
            -PRELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD \
            -PRELEASE_KEY_ALIAS=nr1check-upload \
            -PRELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD \
            --no-daemon

      - name: Generate Play Store images
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python scripts/generate_play_assets.py

      - name: Collect artifacts
        run: |
          mkdir -p android-release
          cp apps/android/app/build/outputs/bundle/release/app-release.aab android-release/NR1Check-v1.0.0.aab
          cp apps/android/upload-keystore.jks android-release/upload-keystore.jks
          cp apps/android/upload-keystore-passwords.txt android-release/upload-keystore-passwords.txt
          cp -R play-store/generated android-release/play-store-images
          cp -R play-store/listing android-release/play-store-listing

      - name: Upload Android release bundle
        uses: actions/upload-artifact@v4
        with:
          name: nr1check-google-play-release
          path: android-release
          retention-days: 14
